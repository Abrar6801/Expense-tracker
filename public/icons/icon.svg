<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Sparkle / dollar-wave icon: stylized "A" for Aurora -->
  <!-- Bar chart bars -->
  <rect x="112" y="280" width="72" height="160" rx="16" fill="white" opacity="0.9"/>
  <rect x="220" y="200" width="72" height="240" rx="16" fill="white"/>
  <rect x="328" y="140" width="72" height="300" rx="16" fill="white" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="148,260 256,180 364,120" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- Dot on trend -->
  <circle cx="364" cy="120" r="18" fill="white" opacity="0.8"/>
  <!-- Small top label -->
  <rect x="176" y="72" width="160" height="24" rx="12" fill="white" opacity="0.25"/>
</svg>
